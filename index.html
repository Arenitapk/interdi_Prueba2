<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interdi</title>
    <link rel="stylesheet" href="Style/style_index.css">
    <!-- IMPORTACION DE LA LETRA -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Signika:wght,GRAD@300..700,-30..0&display=swap" rel="stylesheet">
</head>
<body>
    <!-- ============================================================================== -->
                    <!-- MENU PRINCIPAL HEADER ESTATICO EN LA PAGINA DE INICIO -->
    <header class="menuPrincipalHeader">

    <!-- IZQUIERDA: Logo -->
        <div class="contenedorLogo">
            <a href="#seccion_Inicio">
                <img src="Img/logo_Interdi.png" href="#seccion_Inicio" alt="Interdi">
            </a>
        </div>

    <!-- CENTRO: Navegación -->
        <nav class="contenedorMenuPrincipal">
            <a class="botonesMenuPrincipal" href="#seccion_ComoFunciona">Como funciona</a>
            <a class="botonesMenuPrincipal" href="#seccion_Nosotros">Nosotros</a>
            <a class="botonesMenuPrincipal" href="#seccion_Contacto">Contacto</a>
            <a class="botonesMenuPrincipal" href="#seccion_Ayuda">Ayuda</a>
        </nav>

    <!--  DERECHA: Registro/Login -->
        <div class="contenedorBotonRegistro_IniciarSesion">
            <button class="botonRegistro_IniciarSesion">Registro/Iniciar sesion</button>
        </div>
    </header>
    
    <!-- ============================================================================== -->
                                        <!-- INICIO -->
        <div class="contenedorInicio">
            <div class="contenedorInicioParteIzquierda">
            <h1 class="tituloIntroduccionPrincipal">Encuentra intérpretes de <span class="textoLenguaSeñas">lengua de señas </span>de forma rápida y segura</h1>
                <p>🔹​ Accede a intérpretes verificados y calificados</p>
                <p>🔹​ Agenda servicios según tu disponibilidad</p>
                <p>🔹​ Plataforma segura, accesible y fácil de usar</p>
            <button class="botonEmpezar">Empezar</button>
            </div>
            
            <div class="contenedorInicioParteDerechaImagen">
                <img src="Img/imgInicio.png" alt="imagen introductoria">
            </div>
        </div>
    <!-- ============================================================================== -->
                                        <!-- COMO FUNCIONA -->
        <div class="contenedorComoFunciona">
            <div class="contenedorConoceInterpretes">
                <h1>Elige entre los interpretes disponibles</h1>
            </div>

        </div>
</body>
</html>
